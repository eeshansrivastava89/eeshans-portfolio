name: Build and Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours (refreshes Substack snapshot and rebuilds)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-and-deploy-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # 1. Setup
      # ─────────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # ─────────────────────────────────────────────────────────────
      # 2. Install dependencies
      # ─────────────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ─────────────────────────────────────────────────────────────
      # 3. Refresh scheduled content snapshots
      # ─────────────────────────────────────────────────────────────
      - name: Refresh Substack feed snapshot
        if: github.event_name != 'push'
        run: pnpm refresh:substack

      - name: Commit Substack snapshot changes
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- .cache/substack-feed.json; then
            echo "Substack snapshot unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .cache/substack-feed.json
            git commit -m "chore: refresh Substack feed [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      # ─────────────────────────────────────────────────────────────
      # 4. Typecheck
      # ─────────────────────────────────────────────────────────────
      - name: Typecheck
        run: pnpm astro check

      # ─────────────────────────────────────────────────────────────
      # 5. Validate analytics config
      # ─────────────────────────────────────────────────────────────
      - name: Validate analytics config
        run: |
          if [ "$PUBLIC_ENABLE_ANALYTICS" = "true" ]; then
            if [ -z "$PUBLIC_POSTHOG_KEY" ]; then
              echo "::error::PUBLIC_ENABLE_ANALYTICS is true but PUBLIC_POSTHOG_KEY secret is missing."
              exit 1
            fi
            if [ -z "$PUBLIC_POSTHOG_HOST" ]; then
              echo "::error::PUBLIC_ENABLE_ANALYTICS is true but PUBLIC_POSTHOG_HOST secret is missing."
              exit 1
            fi
            if [ -z "$PUBLIC_ANALYTICS_ALLOWED_HOSTS" ]; then
              echo "::error::PUBLIC_ENABLE_ANALYTICS is true but PUBLIC_ANALYTICS_ALLOWED_HOSTS variable is missing."
              exit 1
            fi
          else
            echo "Analytics disabled — skipping validation."
          fi
        env:
          PUBLIC_ENABLE_ANALYTICS: ${{ vars.PUBLIC_ENABLE_ANALYTICS }}
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
          PUBLIC_ANALYTICS_ALLOWED_HOSTS: ${{ vars.PUBLIC_ANALYTICS_ALLOWED_HOSTS }}

      # ─────────────────────────────────────────────────────────────
      # 6. Deploy to Fly.io (remote build with secrets/args from GitHub)
      # ─────────────────────────────────────────────────────────────
      - name: Deploy to Fly.io
        run: >
          flyctl deploy --remote-only
          --build-arg PUBLIC_POSTHOG_KEY="$PUBLIC_POSTHOG_KEY"
          --build-arg PUBLIC_POSTHOG_HOST="$PUBLIC_POSTHOG_HOST"
          --build-arg PUBLIC_POSTHOG_UI_HOST="$PUBLIC_POSTHOG_UI_HOST"
          --build-arg PUBLIC_ANALYTICS_ALLOWED_HOSTS="$PUBLIC_ANALYTICS_ALLOWED_HOSTS"
          --build-secret GITHUB_TOKEN="$GITHUB_TOKEN"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
          PUBLIC_POSTHOG_UI_HOST: ${{ vars.PUBLIC_POSTHOG_UI_HOST || 'https://us.posthog.com' }}
          PUBLIC_ANALYTICS_ALLOWED_HOSTS: ${{ vars.PUBLIC_ANALYTICS_ALLOWED_HOSTS }}